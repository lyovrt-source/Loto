<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loto LyovT Chicken Edition</title>
<style>
:root {
  --main-bg: radial-gradient(circle at top, #1a1d2b, #0b0d14);
  --card-bg: rgba(0, 0, 0, 0.55); 
  --cell-bg: rgba(255, 255, 255, 0.08);
  --cell-border: rgba(255, 255, 255, 0.15);
  --accent-color: #ffd700;
  --challenge-red: #ff0000;
}

/* ԱՆԻՄԱՑԻԱՆԵՐ */
@keyframes anim0 { 0% { transform: translateX(200px) rotate(360deg); opacity: 0; } 100% { transform: translateX(0) rotate(0deg); opacity: 1; } }
@keyframes anim1 { 0% { transform: scale(0.1) rotate(-180deg); opacity: 0; } 100% { transform: scale(1) rotate(0); opacity: 1; } }
@keyframes anim2 { 0% { transform: translateY(-150px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
@keyframes anim3 { 0% { transform: perspective(400px) rotateY(90deg); opacity: 0; } 100% { transform: perspective(400px) rotateY(0deg); opacity: 1; } }
@keyframes anim4 { 0% { transform: scale(3); opacity: 0; filter: blur(15px); } 100% { transform: scale(1); opacity: 1; filter: blur(0); } }
@keyframes anim5 { 0% { transform: skewX(-50deg); opacity: 0; } 100% { transform: skewX(0); opacity: 1; } }
@keyframes anim6 { 0% { transform: scale(0); opacity: 0; } 50% { transform: scale(1.3); } 100% { transform: scale(1); opacity: 1; } }
@keyframes anim7 { 0% { clip-path: inset(50% 0 50% 0); opacity: 0; } 100% { clip-path: inset(0 0 0 0); opacity: 1; } }
@keyframes anim8 { 0% { transform: rotate(15deg) translateY(100px); opacity: 0; } 100% { transform: rotate(0) translateY(0); opacity: 1; } }
@keyframes anim9 { 0% { filter: hue-rotate(180deg); transform: scale(0.5); opacity: 0; } 100% { filter: hue-rotate(0); transform: scale(1); opacity: 1; } }

/* ՁՎԻ ԱԾԵԼՈՒ ԵՎ ԳԼՈՐՎԵԼՈՒ ԱՆԻՄԱՑԻԱ */
@keyframes layEggAndRoll {
  0% { transform: translate(-30px, 35px) scale(0.1) rotate(-90deg); opacity: 0; z-index: 1; }
  30% { transform: translate(-10px, 35px) scale(1) rotate(-90deg); opacity: 1; z-index: 1; }
  40% { z-index: 25; }
  100% { transform: translate(110px, 75px) scale(1) rotate(360deg); opacity: 1; z-index: 25; }
}

@keyframes eggDropToCell {
  0% { transform: translateY(-50px) scale(1.5); opacity: 0; filter: brightness(2); }
  100% { transform: translateY(0) scale(1); opacity: 1; filter: brightness(1); }
}

@keyframes crackAppear {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
  100% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
}

@keyframes henShake {
  0% { transform: translate(1px, 1px) rotate(0deg); }
  10% { transform: translate(-1px, -2px) rotate(-1deg); }
  20% { transform: translate(-3px, 0px) rotate(1deg); }
  30% { transform: translate(3px, 2px) rotate(0deg); }
  40% { transform: translate(1px, -1px) rotate(1deg); }
  50% { transform: translate(-1px, 2px) rotate(-1deg); }
  60% { transform: translate(-3px, 1px) rotate(0deg); }
  70% { transform: translate(3px, 1px) rotate(-1deg); }
  80% { transform: translate(-1px, -1px) rotate(1deg); }
  90% { transform: translate(1px, 2px) rotate(0deg); }
  100% { transform: translate(1px, -2px) rotate(-1deg); }
}

body {
  font-family: sans-serif; background: var(--main-bg); background-attachment: fixed;
  color: #fff; display: flex; flex-direction: column; align-items: center;
  padding: 20px 10px; min-height: 100vh; margin: 0; overflow-x: hidden;
  position: relative;
}

#chickenDisplay {
  position: relative; width: 250px; height: auto; margin: 15px 80px 15px 0; 
  z-index: 10; display: flex; justify-content: center; align-items: center;
}

#chickenImage { width: 100%; height: auto; position: relative; z-index: 10; }

#currentNumber { 
  position: absolute; top: 50%; left: 50%; width: 50px; height: 65px; 
  line-height: 65px; text-align: center; font-size: 1.5em; font-weight: bold; 
  color: #000; border-radius: 50% 50% 50% 50% / 65% 65% 35% 35%;
  border: 2px solid rgba(255,255,255,0.4); box-shadow: 0 5px 10px rgba(0,0,0,0.6); 
  opacity: 0; pointer-events: none; z-index: 1;
}

#chickenDisplay.shake #chickenImage { animation: henShake 0.5s linear infinite; }

.controls { margin: 10px 0; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; z-index: 30; position: relative;}
button {
  padding: 8px 14px; border: none; border-radius: 10px; cursor: pointer;
  background: linear-gradient(135deg, #444, #222); color: var(--accent-color);
  font-weight: bold; box-shadow: 0 4px 8px rgba(0,0,0,0.4); transition: 0.2s;
}

.cards { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; flex-direction: column-reverse; z-index: 30; position: relative;}
.card-wrapper { display: flex; flex-direction: column; align-items: center; gap: 5px; }
.card { 
  background: var(--card-bg); padding: 12px 10px; border-radius: 10px; 
  border: 1px solid rgba(255, 215, 0, 0.2); backdrop-filter: blur(6px); position: relative; width: 345px;
}
.challenge-label {
  color: var(--challenge-red); font-size: 0.85em; font-weight: bold; font-style: italic;
  text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 0 8px rgba(255, 0, 0, 0.3);
}
.card.frozen { filter: grayscale(1) brightness(0.5); }
.card.frozen::after {
  content: "PAUSE"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg);
  background: red; color: white; padding: 4px 10px; font-weight: bold; border: 1px solid white; z-index: 100;
}
.card-header-box { display: flex; align-items: center; width: 100%; margin-bottom: 8px; gap: 5px; }
.card-actions { display: flex; gap: 2px; }
.card-actions button { 
  padding: 4px 6px; font-size: 0.75em; background: rgba(255,255,255,0.1); 
  border: 1px solid rgba(255,215,0,0.2); border-radius: 4px;
}
.card-name {
  flex-grow: 1; padding: 3px; border: 1px solid rgba(255, 59, 48, 0.5); border-radius: 4px;
  text-align: center; font-weight: bold; background: rgba(0,0,0,0.3); color: #ff3b30; font-size: 0.9em; width: 60px; outline: none;
}
.row { display: flex; }
.cell {
  width: 36px; height: 46px; margin: 1.5px; line-height: 46px; text-align: center; 
  background: var(--cell-bg); border: 1px solid var(--cell-border);
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; font-weight: 900; font-size: 1.1em; transition: background 0.2s, color 0.1s;
  position: relative; overflow: hidden;
}
.cell .crack-svg {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5);
  width: 100%; height: 100%; opacity: 0; pointer-events: none; stroke: rgba(0, 0, 0, 0.8); stroke-width: 1.5; fill: none;
}
.cell.selected {
  color: #000 !important; box-shadow: 0 4px 8px rgba(0,0,0,0.4); border: 1px solid rgba(0,0,0,0.2) !important;
  animation: eggDropToCell 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}
.cell.selected .crack-svg { opacity: 1; animation: crackAppear 0.4s ease-out forwards; }

#winOverlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(15px);
}
.win-content {
  background: #000; padding: 40px; border-radius: 25px; text-align: center; box-shadow: 0 0 40px rgba(255, 215, 0, 0.3); border: 2px solid var(--accent-color); animation: winPop 0.5s ease-out; max-width: 85%;
}
.win-content p#winnerNameDisplay { font-size: 2.5em; font-weight: 900; margin: 20px 0; color: #ff3b30; text-shadow: 0 0 15px rgba(255, 59, 48, 0.4); white-space: pre-wrap; }
.bottom-controls { margin-top: 25px; padding-top: 15px; border-top: 1px dashed var(--accent-color); width: 100%; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; z-index: 20; position: relative;}

/* ՊԱՏՄՈՒԹՅԱՆ ՈՃԵՐԸ */
#eggsContainerWrapper { display: none; margin-top: 20px; flex-direction: column; align-items: center; width: 100%; }
#allEggsDisplay {
  display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 15px; border: 1px solid var(--accent-color); max-width: 380px;
}
.mini-egg {
  width: 32px; height: 42px; border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; background: var(--cell-bg); font-size: 0.85em; font-weight: bold;
  display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
}
/* Ճաքը թաքցված է սկզբում */
.mini-egg .crack-svg { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; height: 100%; stroke: rgba(0, 0, 0, 0.8); stroke-width: 1.5; fill: none; }

.mini-egg.selected { color: #000 !important; animation: eggDropToCell 0.4s forwards; }
.mini-egg.selected .crack-svg { display: block; animation: crackAppear 0.4s ease-out forwards; }
</style>
</head>
<body>

<div id="winOverlay">
  <div class="win-content">
    <h1 id="winTitle">🏆 ՀԱՂԹԱՆԱԿ</h1>
    <p id="winnerNameDisplay"></p>
    <button onclick="closeWinOverlay()">Շարունակել</button>
  </div>
</div>

<div class="controls">
  <input type="number" id="cardCount" value="1" min="1" max="15" style="width: 50px; border-radius: 8px; padding: 5px; border: 1px solid var(--accent-color); background: #222; color: #fff;">
  <button id="loadSavedBtn">📂</button>
  <button id="generateCards">Սարքել</button>
  <button id="addCard">➕</button>
</div>

<div class="cards" id="cardsContainer"></div>

<div id="chickenDisplay">
  <img id="chickenImage" src="https://media4.giphy.com/media/93ilR5sDSpEWT3gdNj/giphy.gif" alt="Լոտոյի հավ">
  <div id="currentNumber">-</div>
</div>

<div class="controls">
  <button id="drawNumber">ԱԾԵԼ ՁՈՒ</button>
  <button id="autoPlayBtn">Auto</button>
  <button id="autoMarkBtn" style="background: linear-gradient(135deg, #2e7d32, #1b5e20); color: #fff;">Նշել</button>
  <button id="shuffleBtn" style="background: linear-gradient(135deg, #6a11cb, #2575fc); color: #fff;">Խառնել</button>
  <button id="resetBtn">ՄԱՔՐԵԼ</button>
</div>

<button id="toggleHistoryBtn" style="margin-top: 10px;">📜 Պատմություն</button>

<div id="eggsContainerWrapper">
  <div id="allEggsDisplay"></div>
</div>

<div class="bottom-controls">
  <button id="changeAnimBtn">🎬 Անիմ 1</button>
  <button id="turboBtn">🚀</button>
</div>

<script>
const crackSvgHtml = `
<svg class="crack-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
  <path d="M50,10 L45,25 L55,35 L40,50 L60,65 L48,80 L52,90" />
  <path d="M45,25 L30,20 L20,30" />
  <path d="M55,35 L70,30 L80,40" />
  <path d="M40,50 L25,55 L15,70" />
  <path d="M60,65 L75,60 L85,75" />
</svg>`;

const winSound = new Audio('https://www.myinstants.com/media/sounds/tada.mp3');
let numbers=[], drawnNumbers=[], autoPlay=null, isTurbo=false, currentAnim = 0;
const cardsContainer=document.getElementById('cardsContainer');
const chickenDisplay = document.getElementById('chickenDisplay');
const globalRanges = [[1,9],[10,19],[20,29],[30,39],[40,49],[50,59],[60,69],[70,79],[80,90]];

function getNumberTextColor(n) { const hue = (n - 1) * 4; return `hsl(${hue}, 100%, 65%)`; }
function getNumberGradient(n) { const hue = (n - 1) * 4; return `radial-gradient(circle at 40% 40%, hsl(${hue}, 90%, 80%), hsl(${hue}, 85%, 55%), hsl(${hue}, 85%, 35%))`; }

function initHistoryEggs() {
    const container = document.getElementById('allEggsDisplay');
    container.innerHTML = '';
    for(let i=1; i<=90; i++) {
        const egg = document.createElement('div');
        egg.className = 'mini-egg';
        egg.id = 'hist-egg-' + i;
        egg.innerHTML = crackSvgHtml + `<span>${i}</span>`;
        egg.style.color = getNumberTextColor(i);
        container.appendChild(egg);
    }
}

function initNumbers(){
    numbers=[...Array(90).keys()].map(i=>i+1);
    drawnNumbers=[];
    const cn = document.getElementById('currentNumber');
    cn.style.opacity = '0'; cn.textContent = '-';
    initHistoryEggs();
}

function stopAutoPlay() { if(autoPlay){ clearInterval(autoPlay); autoPlay=null; document.getElementById('autoPlayBtn').textContent = 'Auto'; } }
function closeWinOverlay() { document.getElementById('winOverlay').style.display = 'none'; }

function createCard(index, savedData = null){
    const wrapper = document.createElement('div');
    wrapper.className = 'card-wrapper';
    const card = document.createElement('div'); card.className = 'card'; wrapper.appendChild(card);
    const header = document.createElement('div'); header.className = 'card-header-box';
    const btnBox = document.createElement('div'); btnBox.className = 'card-actions';
    const del = document.createElement('button'); del.textContent = '🗑️'; del.onclick = () => wrapper.remove();
    const edit = document.createElement('button'); edit.textContent = '✏️'; edit.dataset.edit='false';
    const refresh = document.createElement('button'); refresh.textContent = '🔄';
    const freeze = document.createElement('button'); freeze.textContent = '❄️';
    const save = document.createElement('button'); save.textContent = '💾';
    btnBox.append(del, edit, refresh, freeze, save);
    const nameInput = document.createElement('input'); nameInput.className = 'card-name';
    nameInput.value = savedData ? savedData.name : 'Կարտ ' + index;
    nameInput.onfocus = function() { this.select(); };
    header.append(btnBox, nameInput); card.appendChild(header);

    function fill(data = null){
        card.querySelectorAll('.row').forEach(r=>r.remove());
        const used=new Set();
        for(let r=0;r<3;r++){
            const row=document.createElement('div'); row.className='row';
            for(let c=0;c<9;c++){
                const cell=document.createElement('div'); cell.className='cell';
                cell.innerHTML = crackSvgHtml;
                const numberSpan = document.createElement('span'); cell.appendChild(numberSpan);
                const setCellNumber = (n) => {
                    numberSpan.textContent = n;
                    cell.style.color = n ? getNumberTextColor(parseInt(n)) : '#fff';
                };
                if(data) setCellNumber(data.cells[r][c]);
                cell.onclick=()=>{
                    if(edit.dataset.edit==='true'){
                        let v=prompt('Թիվ',numberSpan.textContent); 
                        if(v !== null) setCellNumber(v);
                    } else if(!card.classList.contains('frozen') && numberSpan.textContent) {
                        toggleCell(cell); checkAllWinners();
                    }
                };
                row.appendChild(cell);
            }
            if(!data){
                 let cols=[...Array(9).keys()].sort(()=>Math.random()-0.5).slice(0,5);
                 cols.forEach(c => {
                    let cell = row.childNodes[c], n;
                    let numberSpan = cell.querySelector('span');
                    const range = globalRanges[c];
                    do{ n=Math.floor(Math.random()*(range[1]-range[0]+1))+range[0]; }while(used.has(n));
                    used.add(n); numberSpan.textContent=n; cell.style.color = getNumberTextColor(n);
                 });
            }
            card.appendChild(row);
        }
    }
    fill(savedData);
    refresh.onclick=()=>fill();
    edit.onclick=()=>{ edit.dataset.edit = edit.dataset.edit==='true'?'false':'true'; edit.textContent = edit.dataset.edit==='true'?'✅':'✏️'; };
    freeze.onclick=()=>{ card.classList.toggle('frozen'); freeze.textContent = card.classList.contains('frozen') ? '🔥' : '❄️'; };
    save.onclick=()=>{
        let all = JSON.parse(localStorage.getItem('loto_cards') || "[]");
        let cells = []; card.querySelectorAll('.row').forEach(row => { let r=[]; row.querySelectorAll('.cell span').forEach(c=>r.push(c.textContent)); cells.push(r); });
        all.push({name: nameInput.value, cells: cells});
        localStorage.setItem('loto_cards', JSON.stringify(all)); alert("✅");
    };
    const challengeLabel = document.createElement('div'); challengeLabel.className = 'challenge-label'; challengeLabel.textContent = 'logic & math challenge';
    wrapper.appendChild(challengeLabel); cardsContainer.appendChild(wrapper);
}

function toggleCell(cell) {
    const numberSpan = cell.querySelector('span');
    const val = parseInt(numberSpan.textContent);
    if (!val) return;
    cell.classList.toggle('selected');
    if (cell.classList.contains('selected')) {
        cell.style.background = getNumberGradient(val); cell.style.color = '#000';
    } else {
        cell.style.background = 'var(--cell-bg)'; cell.style.color = getNumberTextColor(val);
    }
}

function checkAllWinners() {
    let winners = [];
    document.querySelectorAll('.card').forEach(card => {
        const cells = [...card.querySelectorAll('.cell')].filter(c => c.querySelector('span').textContent);
        if (cells.length && cells.every(c => c.classList.contains('selected'))) winners.push(card.querySelector('.card-name').value);
    });
    if (winners.length > 0) {
        stopAutoPlay();
        document.getElementById('winTitle').textContent = winners.length > 1 ? "🏆 ՀԱՂԹՈՂՆԵՐ" : "🏆 ՀԱՂԹԱՆԱԿ";
        document.getElementById('winnerNameDisplay').textContent = winners.join("\n");
        document.getElementById('winOverlay').style.display = 'flex';
        winSound.play(); return true;
    }
    return false;
}

function drawNumber(){
    if(!numbers.length) return;
    let n = numbers.splice(Math.floor(Math.random()*numbers.length),1)[0];
    drawnNumbers.push(n);

    // Պատմության մեջ նշել
    const histEgg = document.getElementById('hist-egg-' + n);
    if(histEgg) {
        histEgg.classList.add('selected');
        histEgg.style.background = getNumberGradient(n);
        // Սև գույն թիվը դնելուց հետո
        histEgg.querySelector('span').style.color = '#000';
    }

    const cn = document.getElementById('currentNumber');
    cn.textContent=n; cn.style.background = getNumberGradient(n); cn.style.opacity='1';
    cn.style.animation = 'none'; void cn.offsetWidth;
    cn.style.animation = `layEggAndRoll 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards`;
    chickenDisplay.classList.add('shake');
    setTimeout(() => { chickenDisplay.classList.remove('shake'); }, 500);

    let stopNeeded = false;
    document.querySelectorAll('.card').forEach(card => {
        if (!card.classList.contains('frozen')) {
            card.querySelectorAll('.cell').forEach(c => {
                const numberSpan = c.querySelector('span');
                if (+numberSpan.textContent === n) {
                    c.classList.add('selected'); c.style.background = getNumberGradient(n); c.style.color = '#000';
                }
            });
            let cells = [...card.querySelectorAll('.cell')].filter(c => c.querySelector('span').textContent !== "");
            if (cells.filter(c => !c.classList.contains('selected')).length === 2) stopNeeded = true;
        }
    });
    if (!checkAllWinners() && stopNeeded && autoPlay) stopAutoPlay();
}

document.getElementById('autoMarkBtn').onclick = () => {
    document.querySelectorAll('.card').forEach(card => {
        if (!card.classList.contains('frozen')) {
            card.querySelectorAll('.cell').forEach(cell => {
                const numberSpan = cell.querySelector('span');
                let val = parseInt(numberSpan.textContent);
                if (drawnNumbers.includes(val)) {
                    cell.classList.add('selected'); cell.style.background = getNumberGradient(val); cell.style.color = '#000';
                }
            });
        }
    });
    checkAllWinners();
};

document.getElementById('resetBtn').onclick = () => {
    initNumbers();
    document.querySelectorAll('.cell').forEach(cell => {
        cell.classList.remove('selected'); cell.style.background = 'var(--cell-bg)';
        const val = parseInt(cell.querySelector('span').textContent);
        cell.style.color = val ? getNumberTextColor(val) : '#fff';
    });
    stopAutoPlay(); closeWinOverlay();
};

document.getElementById('shuffleBtn').onclick = () => {
    const wrappers = Array.from(cardsContainer.children);
    for (let i = wrappers.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        cardsContainer.appendChild(wrappers[j]);
    }
};

document.getElementById('toggleHistoryBtn').onclick = function() {
    const wrapper = document.getElementById('eggsContainerWrapper');
    if (wrapper.style.display === 'flex') {
        wrapper.style.display = 'none'; this.textContent = '📜 Պատմություն';
    } else {
        wrapper.style.display = 'flex'; this.textContent = '❌ Պատմություն';
    }
};

document.getElementById('generateCards').onclick = () => { cardsContainer.innerHTML=''; initNumbers(); for (let i = 1; i <= document.getElementById('cardCount').value; i++) createCard(i); };
document.getElementById('drawNumber').onclick=drawNumber;
document.getElementById('addCard').onclick=()=>createCard(document.querySelectorAll('.card').length+1);
document.getElementById('turboBtn').onclick=function(){ isTurbo=!isTurbo; this.style.background=isTurbo?'#ffd700':'#444'; };
document.getElementById('autoPlayBtn').onclick=function(){
    if(autoPlay) stopAutoPlay();
    else { autoPlay=setInterval(drawNumber, isTurbo?600:1500); this.textContent='Stop'; }
};
document.getElementById('changeAnimBtn').onclick = () => { currentAnim = (currentAnim + 1) % 10; document.getElementById('changeAnimBtn').textContent = "🎬 Անիմ " + (currentAnim + 1); };

initNumbers();
</script>
</body>
</html>
